<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style3.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Maquinaria PRO - Conexão Confiável para sua Obra</title>
</head>

<body>
    <header class="main-header">
        <div class="container">
            <a href="#" class="logo">Maquinaria <strong>PRO</strong></a>
            <nav class="main-nav">
                <a href="#">Encontrar Equipamento</a>
                <a href="#">Para Operadores</a>
                <a href="#">Sobre Nós</a>
            </nav>
            <div class="header-actions">
                <a href="#" class="login-btn">Entrar</a>
                <a href="#" class="btn btn-primary">Anunciar Equipamento</a>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h2>Cadastro de Novo Usuário</h2>
                <form class="registration-form" id="registration-form" action="/cadastro" method="POST">

                    <div class="name">
                    <label for="name">Nome Completo</label><br>
                    <input type="text" id="name" name="name" placeholder="Digite seu nome completo" required>
                    </div><br>

                    <div class="password">
                    <label for="password">Senha</label><br>
                    <input type="password" id="password" name="password" placeholder="mínimo 8 caracteres" required>
                    </div><br>

                    <div class="button">
                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                    </div>
                </form>
            </div>
        </section>

    </main>

</body>
</html>
